<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ritual — Audio Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #ccc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #181818;
      border-bottom: 1px solid #2a2a2a;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.02em;
    }
    .partner-inputs {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .partner-block {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .partner-block label {
      font-size: 12px;
      color: #888;
      white-space: nowrap;
    }
    .partner-block input[type="text"] {
      background: #222;
      border: 1px solid #333;
      color: #eee;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 13px;
      width: 110px;
      outline: none;
    }
    .partner-block input[type="text"]:focus {
      border-color: #c2185b;
    }
    .gender-select {
      background: #222;
      border: 1px solid #333;
      color: #eee;
      padding: 5px 8px;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      cursor: pointer;
    }
    .header-info {
      margin-left: auto;
      font-size: 11px;
      color: #555;
    }

    /* ── Layout ── */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 53px);
    }

    /* ── Sidebar tabs ── */
    .sidebar {
      width: 140px;
      min-width: 140px;
      background: #141414;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 10px 8px;
    }
    .tab-btn {
      background: none;
      border: none;
      color: #777;
      text-align: left;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn:hover { background: #1e1e1e; color: #bbb; }
    .tab-btn.active {
      background: #1f0a12;
      color: #e91e8c;
      font-weight: 600;
    }
    .play-round-btn {
      margin-top: auto;
      background: #1a0a10;
      border: 1px solid #3a1020;
      color: #e91e8c;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .play-round-btn:hover { background: #2a1018; }
    .play-round-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Content area ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Cue card ── */
    .cue-card {
      background: #161616;
      border: 1px solid #252525;
      border-radius: 8px;
      padding: 14px 16px;
      transition: border-color 0.15s;
    }
    .cue-card:hover { border-color: #333; }
    .cue-card.playing { border-color: #e91e8c; }
    .cue-card.has-audio { border-left: 3px solid #1a6e3a; }
    .cue-card.no-audio { border-left: 3px solid #3a1a1a; }

    .cue-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .cue-id {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      color: #555;
      background: #1a1a1a;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .audio-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 500;
    }
    .audio-badge.ok { background: #0d2e1a; color: #4caf50; }
    .audio-badge.missing { background: #2e0d0d; color: #f44336; }
    .audio-badge.checking { background: #1a1a1a; color: #888; }

    .cue-textarea {
      width: 100%;
      background: #111;
      border: 1px solid #2a2a2a;
      color: #ddd;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.6;
      resize: vertical;
      min-height: 70px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .cue-textarea:focus { border-color: #444; }
    .cue-textarea.modified { border-color: #8b6914; }

    .cue-preview {
      font-size: 12px;
      color: #777;
      margin-top: 8px;
      padding: 6px 10px;
      background: #111;
      border-radius: 4px;
      line-height: 1.5;
      min-height: 24px;
    }
    .cue-preview .name-highlight { color: #e91e8c; font-weight: 500; }

    .cue-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      align-items: center;
    }
    .btn {
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      background: #1a1a1a;
      color: #bbb;
    }
    .btn:hover { background: #252525; color: #fff; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-play { border-color: #1a4a2a; color: #4caf50; }
    .btn-play:hover { background: #0d2e1a; border-color: #2a6a3a; }
    .btn-play.playing { background: #0d2e1a; border-color: #4caf50; }
    .btn-regen { border-color: #1a2a4a; color: #64b5f6; }
    .btn-regen:hover { background: #0d1e2e; border-color: #2a4a6a; }
    .btn-save { border-color: #4a3a1a; color: #ffb74d; }
    .btn-save:hover { background: #2e1e0d; border-color: #6a5a2a; }
    .btn-save:disabled { opacity: 0.4; }

    .cue-status {
      margin-left: auto;
      font-size: 11px;
      color: #555;
    }
    .cue-status.ok { color: #4caf50; }
    .cue-status.error { color: #f44336; }
    .cue-status.loading { color: #64b5f6; }

    /* ── Empty / loading states ── */
    .empty-state {
      text-align: center;
      color: #444;
      padding: 60px 20px;
      font-size: 14px;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d0d0d; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }
  </style>
</head>
<body>

<header>
  <h1>🎙 Ritual Audio Preview</h1>
  <div class="partner-inputs">
    <div class="partner-block">
      <label>P1:</label>
      <input type="text" id="p1Name" placeholder="Алексей" value="Алексей">
      <select class="gender-select" id="p1Gender">
        <option value="male">М</option>
        <option value="female">Ж</option>
      </select>
    </div>
    <div class="partner-block">
      <label>P2:</label>
      <input type="text" id="p2Name" placeholder="Мария" value="Мария">
      <select class="gender-select" id="p2Gender">
        <option value="male">М</option>
        <option value="female" selected>Ж</option>
      </select>
    </div>
  </div>
  <div class="header-info" id="headerInfo">Загрузка каталога...</div>
</header>

<div class="main-layout">
  <div class="sidebar" id="sidebar">
    <!-- Tabs injected by JS -->
    <button class="play-round-btn" id="playRoundBtn" disabled>▶ Весь раунд</button>
  </div>
  <div class="content" id="content">
    <div class="empty-state">Загрузка...</div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
